  - generic [ref=e63]:
    - generic [ref=e64]: Définition
    - heading "Qu'est-ce qu'un véhicule hors d'usage (VHU) ?" [level=2] [ref=e65]
    - paragraph [ref=e66]: "Un véhicule est considéré comme épave ou VHU (Véhicule Hors d'Usage) dès lors qu'il ne peut plus circuler et qu'il est destiné à la destruction : trop endommagé suite à un accident, économiquement irréparable, immobilisé depuis longtemps, ou simplement en fin de vie. En France, la destruction d'un véhicule hors d'usage est encadrée par la loi : elle doit obligatoirement être confiée à un centre agréé VHU. Il est interdit d'abandonner un véhicule sur la voie publique ou en copropriété sous peine d'amende."
    - generic [ref=e67]:
      - strong [ref=e68]: "Obligation légale :"
      - text: tout véhicule remis pour destruction doit faire l'objet d'un certificat de destruction délivré par un centre agréé préfectoral. Sans ce document, le propriétaire reste légalement responsable du véhicule.
